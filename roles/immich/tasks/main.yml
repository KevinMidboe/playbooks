---
- name: Check immich variables are defined
  assert:
    that:
      - nfs_mount is defined
      - mount_point is defined
      - nfs_mount | length > 0
      - mount_point | length > 0
      - DB_PASSWORD is defined
      - DB_PASSWORD | length > 0
    fail_msg: "nfs_mount, mount_point & DB_PASSWORD variables are empty or not defined"

- name: Ensure immich /opt dir exists
  file:
    path: /opt/immich
    state: directory
    mode: 0664

- name: Ensure nfs-common package is installed
  package: name=nfs-common state=present

- name: Copy docker-compose template
  template:
    src: docker-compose.j2
    dest: /opt/immich/docker-compose.yml

- name: Copy env template
  template:
    src: env.j2
    dest: /opt/immich/.env

- name: Create immich group for nfs share
  group:
    name: immich
    state: present
    gid: 27000

- name: Ensure mount point exists
  file:
    path: "{{ mount_point }}"
    state: directory

- name: Ensure immich nfs mount is in fstab
  shell: |
    EXISTS=$(cat /etc/fstab | grep "{{nfs_mount}} {{ mount_point }}")
    if [ -z "$EXISTS" ]; then
      echo "{{ nfs_mount }} {{ mount_point }} nfs defaults 0 0" | tee -a /etc/fstab
    fi
    mount {{ mount_point }}

- name: Add immich firewall (ufw) rule
  ufw:
    rule: allow
    port: "2283"

- name: Restart immich docker service
  community.docker.docker_compose_v2:
    project_src: /opt/immich
    state: restarted

- name: Clean up docker images older than 24 hours 
  community.docker.docker_prune:
    containers: true
    images: true
